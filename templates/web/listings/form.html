{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container" style="padding:32px 16px;max-width:800px">
  <h1 style="margin-bottom:24px">{{ title }}</h1>
  <form method="post" enctype="multipart/form-data" style="background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,.08)">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p style="color:#d4111e;font-size:.85rem">{{ field.errors.0 }}</p>{% endif %}
      </div>
    {% endfor %}
    <div class="form-group">
      <label>Фотографии</label>
      <input type="file" name="images" multiple accept="image/*" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% if object %}{% url 'web:listing_detail' object.pk %}{% else %}{% url 'web:my_listings' %}{% endif %}" class="btn btn-outline" style="margin-left:8px">Отмена</a>
  </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Сброс пароля{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Сброс пароля</h1>
  <p style="margin-bottom:16px;color:#6b7280">Введите email — мы отправим ссылку для сброса.</p>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px">Отправить</button>
  </form>
</div>
{% endblock %}
